services:
  - type: web
    name: nexus-agent
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: DB_PATH
        value: /var/data/nexus.db
    disk:
      name: nexus-db
      mountPath: /var/data
      sizeGB: 1
